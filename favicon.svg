<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 580" width="500" height="580">
  <defs>
    <radialGradient id="emberCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe4a0" stop-opacity="0.75"/>
      <stop offset="35%"  stop-color="#e8874a" stop-opacity="0.45"/>
      <stop offset="65%"  stop-color="#c95c1a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c95c1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberWide" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c95c1a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c95c1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="580" fill="#16130d"/>

  <!-- ── EMBER GLOW ── -->
  <ellipse cx="250" cy="448" rx="150" ry="38" fill="url(#emberWide)"/>
  <ellipse cx="250" cy="445" rx="90"  ry="22" fill="url(#emberCore)"/>
  <ellipse cx="250" cy="443" rx="42"  ry="11" fill="#ffc870" opacity="0.28"/>
  <ellipse cx="250" cy="441" rx="18"  ry="5"  fill="#ffe0b0" opacity="0.45"/>

  <!-- ── STICKS — bottom scattered layer (darkest, furthest back) ── -->
  <g stroke="#4a3008" stroke-linecap="round" fill="none">
    <line x1="55"  y1="447" x2="390" y2="432" stroke-width="7"/>
    <line x1="40"  y1="458" x2="310" y2="442" stroke-width="6"/>
    <line x1="300" y1="436" x2="460" y2="448" stroke-width="6"/>
    <line x1="80"  y1="442" x2="190" y2="436" stroke-width="5"/>
  </g>

  <!-- ── STICKS — mid base layer ── -->
  <g stroke="#6b4c0e" stroke-linecap="round" fill="none">
    <line x1="70"  y1="438" x2="400" y2="422" stroke-width="7"/>
    <line x1="60"  y1="430" x2="270" y2="420" stroke-width="6.5"/>
    <line x1="330" y1="428" x2="455" y2="438" stroke-width="6"/>
  </g>

  <!-- ── STICKS — cross layer, moderate angles ── -->
  <g stroke="#7a5812" stroke-linecap="round" fill="none">
    <!-- left-leaning -->
    <line x1="155" y1="428" x2="200" y2="340" stroke-width="7"/>
    <line x1="175" y1="435" x2="228" y2="358" stroke-width="6.5"/>
    <line x1="130" y1="432" x2="188" y2="368" stroke-width="6"/>
    <!-- right-leaning -->
    <line x1="345" y1="428" x2="300" y2="340" stroke-width="7"/>
    <line x1="325" y1="435" x2="272" y2="358" stroke-width="6.5"/>
    <line x1="370" y1="432" x2="312" y2="368" stroke-width="6"/>
  </g>

  <!-- ── STICKS — wide diagonal cross (the big X) ── -->
  <g stroke="#8a6418" stroke-linecap="round" fill="none">
    <line x1="115" y1="438" x2="295" y2="315" stroke-width="7.5"/>
    <line x1="385" y1="438" x2="205" y2="315" stroke-width="7.5"/>
    <line x1="100" y1="445" x2="265" y2="330" stroke-width="7"/>
    <line x1="400" y1="445" x2="235" y2="330" stroke-width="7"/>
  </g>

  <!-- ── STICKS — teepee uprights (lightest, closest) ── -->
  <g stroke="#9c7a22" stroke-linecap="round" fill="none">
    <!-- outer uprights -->
    <line x1="192" y1="420" x2="238" y2="265" stroke-width="7"/>
    <line x1="308" y1="420" x2="262" y2="265" stroke-width="7"/>
    <!-- inner uprights -->
    <line x1="220" y1="412" x2="248" y2="240" stroke-width="6.5"/>
    <line x1="280" y1="412" x2="252" y2="240" stroke-width="6.5"/>
    <!-- center near-verticals -->
    <line x1="240" y1="408" x2="246" y2="228" stroke-width="6"/>
    <line x1="260" y1="408" x2="254" y2="228" stroke-width="6"/>
  </g>

  <!-- ── STICKS — highlight edge (front-most, lightest) ── -->
  <g stroke="#b08c2a" stroke-linecap="round" fill="none">
    <line x1="210" y1="418" x2="243" y2="280" stroke-width="6"/>
    <line x1="290" y1="418" x2="257" y2="280" stroke-width="6"/>
  </g>

  <!-- ── SPARKS ── -->
  <!-- lower sparks, brighter -->
  <circle cx="248" cy="215" r="2.5" fill="#e8874a" opacity="0.9"/>
  <circle cx="255" cy="200" r="2.0" fill="#ffc870" opacity="0.85"/>
  <circle cx="243" cy="195" r="1.8" fill="#e8874a" opacity="0.75"/>
  <!-- mid sparks -->
  <circle cx="262" cy="180" r="2.2" fill="#ffa040" opacity="0.8"/>
  <circle cx="238" cy="172" r="1.5" fill="#ffc870" opacity="0.7"/>
  <circle cx="256" cy="165" r="1.8" fill="#e8874a" opacity="0.65"/>
  <circle cx="245" cy="158" r="1.2" fill="#ffc870" opacity="0.6"/>
  <!-- upper sparks, fading -->
  <circle cx="252" cy="148" r="2.0" fill="#e07030" opacity="0.55"/>
  <circle cx="265" cy="140" r="1.5" fill="#ffa040" opacity="0.5"/>
  <circle cx="240" cy="133" r="1.3" fill="#e8874a" opacity="0.45"/>
  <circle cx="258" cy="125" r="1.8" fill="#c95c1a" opacity="0.4"/>
  <circle cx="248" cy="116" r="1.2" fill="#e07030" opacity="0.35"/>
  <!-- distant sparks, faint -->
  <circle cx="268" cy="108" r="1.5" fill="#c95c1a" opacity="0.28"/>
  <circle cx="242" cy="100" r="1.0" fill="#e8874a" opacity="0.22"/>
  <circle cx="255" cy="092" r="1.3" fill="#c95c1a" opacity="0.18"/>
</svg>
